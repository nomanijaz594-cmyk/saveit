<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SaveIt - Video Downloader</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:#0a0a0f;color:#e8e6ff;min-height:100vh}
    .hero{background:linear-gradient(135deg,#0a0a0f 0%,#12103a 50%,#0a0a0f 100%);padding:3rem 1.5rem 4rem;text-align:center;position:relative;overflow:hidden}
    .nav{display:flex;justify-content:space-between;align-items:center;max-width:900px;margin:0 auto 3rem;padding:0 1rem}
    .logo{display:inline-flex;align-items:center;gap:8px;font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:#fff}
    .logo-icon{width:36px;height:36px;background:linear-gradient(135deg,#6342ff,#a855f7);border-radius:10px;display:flex;align-items:center;justify-content:center}
    .badge{display:inline-block;background:rgba(99,66,255,0.2);border:1px solid rgba(99,66,255,0.4);color:#a78bfa;font-size:12px;padding:4px 14px;border-radius:999px;margin-bottom:1rem}
    h1{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(2rem,5vw,3.2rem);line-height:1.1;margin-bottom:1rem;color:#fff}
    h1 span{background:linear-gradient(90deg,#6342ff,#a855f7,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .subtitle{color:#9ca3af;font-size:15px;max-width:480px;margin:0 auto 2.5rem}
    .input-wrap{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:6px 6px 6px 16px;display:flex;align-items:center;gap:8px;max-width:600px;margin:0 auto}
    .input-wrap input{flex:1;background:none;border:none;outline:none;color:#fff;font-size:15px;font-family:'DM Sans',sans-serif}
    .input-wrap input::placeholder{color:#6b7280}
    .btn-dl{background:linear-gradient(135deg,#6342ff,#a855f7);color:#fff;border:none;border-radius:12px;padding:10px 22px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}
    .platforms{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:2rem}
    .plat{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:999px;padding:6px 14px;font-size:13px;color:#9ca3af}
    .plat .dot{width:8px;height:8px;border-radius:50%}
    .dot-tt{background:#fe2c55}.dot-ig{background:#e1306c}.dot-yt{background:#ff0000}.dot-tw{background:#1da1f2}
    .result-box{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:1.5rem;max-width:600px;margin:1.5rem auto 0;text-align:left;display:none}
    .result-box.show{display:block}
    .vid-info{display:flex;gap:14px;align-items:flex-start;margin-bottom:1rem}
    .vid-thumb{width:90px;height:60px;background:rgba(99,66,255,0.2);border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:28px}
    .vid-title{font-size:14px;color:#e8e6ff;font-weight:500;margin-bottom:4px}
    .vid-meta{font-size:12px;color:#6b7280}
    .dl-options{display:flex;flex-direction:column;gap:8px}
    .dl-row{display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:10px 14px}
    .dl-row-label{font-size:13px;color:#d1d5db}
    .dl-row-badge{font-size:11px;background:rgba(99,66,255,0.2);color:#a78bfa;padding:2px 8px;border-radius:999px;margin-left:8px}
    .btn-sm{background:rgba(99,66,255,0.3);border:1px solid rgba(99,66,255,0.5);color:#c4b5fd;border-radius:8px;padding:6px 14px;font-size:12px;text-decoration:none;display:inline-block}
    .loader{display:none;text-align:center;padding:1rem;color:#a78bfa;font-size:14px}
    .loader.show{display:block}
    .spinner{display:inline-block;width:20px;height:20px;border:2px solid rgba(99,66,255,0.3);border-top-color:#6342ff;border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:8px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .error-msg{color:#f87171;font-size:13px;text-align:center;margin-top:1rem;display:none}
    .error-msg.show{display:block}
    footer{text-align:center;padding:2rem;color:#374151;font-size:13px;border-top:1px solid rgba(255,255,255,0.05)}
    footer span{color:#6342ff}
  </style>
</head>
<body>

<div class="hero">
  <nav class="nav">
    <div class="logo">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </div>
      SaveIt
    </div>
  </nav>

  <div class="badge">No watermark &bull; Free &bull; Fast</div>
  <h1>Download Videos<br>from <span>Anywhere</span></h1>
  <p class="subtitle">TikTok, Instagram, YouTube, Twitter — paste the link and download without watermark in seconds.</p>

  <div class="input-wrap">
    <input type="text" id="urlInput" placeholder="Paste video link here..." />
    <button class="btn-dl" onclick="handleDownload()">Download</button>
  </div>

  <div class="loader" id="loader"><span class="spinner"></span>Processing...</div>
  <div class="error-msg" id="errMsg"></div>

  <div class="result-box" id="resultBox">
    <div class="vid-info">
      <div class="vid-thumb">🎬</div>
      <div>
        <div class="vid-title" id="vidTitle"></div>
        <div class="vid-meta" id="vidMeta"></div>
      </div>
    </div>
    <div class="dl-options" id="dlOptions"></div>
  </div>

  <div class="platforms">
    <div class="plat"><span class="dot dot-tt"></span>TikTok</div>
    <div class="plat"><span class="dot dot-ig"></span>Instagram</div>
    <div class="plat"><span class="dot dot-yt"></span>YouTube</div>
    <div class="plat"><span class="dot dot-tw"></span>Twitter/X</div>
  </div>
</div>

<footer>Made with ❤️ — <span>SaveIt</span> — Free Video Downloader</footer>

<script>
function detectPlatform(url) {
  if (url.includes('tiktok.com')) return 'TikTok';
  if (url.includes('instagram.com')) return 'Instagram';
  if (url.includes('facebook.com') || url.includes('fb.watch')) return 'Facebook';
  if (url.includes('youtube.com') || url.includes('youtu.be')) return 'YouTube';
  if (url.includes('twitter.com') || url.includes('x.com')) return 'Twitter/X';
  return null;
}

function isValidUrl(str) {
  try { new URL(str); return true; } catch { return false; }
}
function getDownloadUrl(platform, url) {
  const encoded = encodeURIComponent(url);
  if (platform === 'TikTok') {
    return [
      { label: 'Video (No Watermark)', quality: 'HD', url: `https://ssstik.io/#url=${encoded}` },
      { label: 'Video (No Watermark)', quality: 'SD', url: `https://snaptik.app/?url=${encoded}` }
    ];
  }
  if (platform === 'Instagram') {
    return [
      { label: 'Reel / Video', quality: 'HD', url: `https://snapinsta.app/` },
      { label: 'Reel / Video', quality: 'SD', url: `https://instavideosave.net/` }
    ];
  }
  if (platform === 'YouTube') {
    return [
      { label: 'Video', quality: 'HD', url: `https://en.savefrom.net/#url=${encoded}` },
      { label: 'Audio', quality: 'MP3', url: `https://ytmp3.cc/` }
    ];
  }
 if (platform === 'Facebook') {
    return [
      { label: 'Video HD', quality: 'HD', url: `https://fbdownloader.net/` },
      { label: 'Video SD', quality: 'SD', url: `https://savefrom.net/#url=${encoded}` }
    ];
  }
  if (platform === 'Twitter/X') {
    return [
      { label: 'Video', quality: 'HD', url: `https://twittervideodownloader.com/` },
      { label: 'Video', quality: 'SD', url: `https://saver.social/` }
    ];
  }
  return [];
}

  

function handleDownload() {
  const url = document.getElementById('urlInput').value.trim();
  const loader = document.getElementById('loader');
  const err = document.getElementById('errMsg');
  const box = document.getElementById('resultBox');

  err.classList.remove('show');
  box.classList.remove('show');

  if (!url || !isValidUrl(url)) {
    err.textContent = 'Please paste a valid video URL.';
    err.classList.add('show');
    return;
  }

  const platform = detectPlatform(url);
  if (!platform) {
    err.textContent = 'Platform not supported. Try TikTok, Instagram, YouTube or Twitter/X.';
    err.classList.add('show');
    return;
  }

  loader.classList.add('show');

  setTimeout(() => {
    loader.classList.remove('show');

    const links = getDownloadUrl(platform, url);

    document.getElementById('vidTitle').textContent = platform + ' Video — Ready!';
    document.getElementById('vidMeta').textContent = platform + ' • Click download below';

    const opts = document.getElementById('dlOptions');
    opts.innerHTML = '';

    links.forEach(item => {
      const row = document.createElement('div');
      row.className = 'dl-row';
      row.innerHTML = `
        <div>
          <span class="dl-row-label">${item.label}</span>
          <span class="dl-row-badge">${item.quality}</span>
        </div>
        <a class="btn-sm" href="${item.url}" target="_blank">Download</a>
      `;
      opts.appendChild(row);
    });

    box.classList.add('show');
  }, 1000);
}

document.getElementById('urlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleDownload();
});
</script>
</body>
</html>
